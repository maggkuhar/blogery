<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Внешний трафик</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; }
        header { background: #111; color: #fff; padding: 16px 24px; }
        header h1 { font-size: 20px; }
        .tabs { background: #222; display: flex; }
        .tabs a { padding: 12px 28px; color: #aaa; text-decoration: none; font-size: 14px; border-bottom: 3px solid transparent; }
        .tabs a.active { color: #fff; border-bottom: 3px solid #27ae60; }
        .tabs a:hover { color: #fff; }
        .form-wrap { max-width: 620px; margin: 32px auto; background: #fff; border-radius: 10px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .form-wrap h2 { font-size: 16px; margin-bottom: 24px; color: #333; }
        .section { margin-bottom: 28px; }
        .section-title { font-size: 12px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid #f0f0f0; }
        .field { margin-bottom: 16px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        textarea { height: 80px; resize: vertical; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { padding: 10px 24px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-green { background: #27ae60; color: #fff; }
        .btn-gray { background: #888; color: #fff; }
        .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    </style>
</head>
<body>
{% include '_nav.html' %}

<div class="form-wrap">
    <h2>{{ action }}</h2>
    <form method="post">

        <div class="section">
            <div class="section-title">Основное</div>
            <div class="field">
                <label>Название бота</label>
                <input type="text" name="name" value="{{ item.name if item else '' }}" placeholder="Например: Instagram Разведчик #1" required>
            </div>
            <div class="row">
                <div class="field">
                    <label>Платформа</label>
                    <select name="platform">
                        {% for p in platforms %}
                        <option value="{{ p }}" {% if item and item.platform == p %}selected{% endif %}>{{ p }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field">
                    <label>Роль</label>
                    <select name="role">
                        {% for r in roles %}
                        <option value="{{ r }}" {% if item and item.role == r %}selected{% endif %}>{{ r }}</option>
                        {% endfor %}
                    </select>
                    <div class="hint">Разведчик — ищет. Контакт — взаимодействует.</div>
                </div>
            </div>
            <div class="row">
                <div class="field">
                    <label>Статус</label>
                    <select name="status">
                        {% for s in bot_statuses %}
                        <option value="{{ s }}" {% if item and item.status == s %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field">
                    <label>Аккаунт (логин или токен)</label>
                    <input type="text" name="account" value="{{ item.account if item else '' }}" placeholder="@username или токен">
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Поведение</div>
            <div class="row">
                <div class="field">
                    <label>Лимит действий в день</label>
                    <input type="number" name="daily_limit" value="{{ item.daily_limit if item else 50 }}">
                    <div class="hint">Рекомендуется 20–100 для нового аккаунта</div>
                </div>
                <div class="field">
                    <label>Расписание работы</label>
                    <input type="text" name="schedule" value="{{ item.schedule if item else '09:00-22:00' }}" placeholder="09:00-22:00">
                </div>
            </div>
            <div class="row">
                <div class="field">
                    <label>Задержка мин (сек)</label>
                    <input type="number" name="delay_min" value="{{ item.delay_min if item else 30 }}">
                </div>
                <div class="field">
                    <label>Задержка макс (сек)</label>
                    <input type="number" name="delay_max" value="{{ item.delay_max if item else 120 }}">
                    <div class="hint">Случайная задержка между действиями</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Заметки</div>
            <div class="field">
                <label>Примечания</label>
                <textarea name="notes" placeholder="Особенности, история, что учесть...">{{ item.notes if item else '' }}</textarea>
            </div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-green">{{ action }}</button>
            <a href="/bots" class="btn btn-gray">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
