<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ action }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; }
        header { background: #111; color: #fff; padding: 16px 24px; }
        header h1 { font-size: 20px; }
        .tabs { background: #222; display: flex; }
        .tabs a { padding: 12px 28px; color: #aaa; text-decoration: none; font-size: 14px; border-bottom: 3px solid transparent; }
        .tabs a.active { color: #fff; border-bottom: 3px solid #27ae60; }
        .tabs a:hover { color: #fff; }
        .form-wrap { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 10px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        textarea { height: 80px; resize: vertical; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn { padding: 10px 24px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-green { background: #27ae60; color: #fff; }
        .btn-gray { background: #888; color: #fff; }
    </style>
</head>
<body>
{% include '_nav.html' %}

<div class="form-wrap">
    <form method="post">
        <div class="field">
            <label>Имя / Название</label>
            <input type="text" name="name" value="{{ item.name if item else '' }}" required>
        </div>
        <div class="field">
            <label>Платформа</label>
            <select name="platform">
                {% for p in platforms %}
                <option value="{{ p }}" {% if item and item.platform == p %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field">
            <label>Ссылка</label>
            <input type="url" name="url" value="{{ item.url if item else '' }}">
        </div>
        <div class="field">
            {% if field_count == "members" %}
            <label>Участников</label>
            <input type="number" name="members" value="{{ item.members if item else 0 }}">
            {% else %}
            <label>Подписчиков</label>
            <input type="number" name="subscribers" value="{{ item.subscribers if item else 0 }}">
            {% endif %}
        </div>
        <div class="field">
            <label>Тематика</label>
            <input type="text" name="topic" value="{{ item.topic if item else '' }}" placeholder="Например: фитнес, кулинария, мода">
        </div>
        <div class="field">
            <label>Статус</label>
            <select name="status">
                {% for s in statuses %}
                <option value="{{ s }}" {% if item and item.status == s %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field">
            <label>Папка / Категория</label>
            <input type="text" name="folder" value="{{ item.folder if item else 'общие' }}">
        </div>
        <div class="field">
            <label>Комментарий</label>
            <textarea name="comment">{{ item.comment if item else '' }}</textarea>
        </div>
        <div class="field">
            <label>Рекомендация</label>
            <textarea name="recommendation">{{ item.recommendation if item else '' }}</textarea>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-green">{{ action }}</button>
            <a href="{{ '/channels' if tab == 'channels' else ('/groups' if tab == 'groups' else '/') }}" class="btn btn-gray">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
